<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Story Co-Writer – Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Forest Background ── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      background: #0d1b2a;
      overflow: hidden;
    }

    .forest {
      position: fixed; inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, #1a3a5c 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 30% 0%, #0f2a45 0%, transparent 60%),
        linear-gradient(180deg, #0a1520 0%, #112235 40%, #0d1b2a 100%);
    }

    /* Layered SVG trees */
    .forest svg { position: absolute; bottom: 0; width: 100%; }

    /* Mist layers */
    .mist {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30%;
      background: linear-gradient(to top, rgba(100,160,220,0.08) 0%, transparent 100%);
      animation: driftMist 8s ease-in-out infinite alternate;
    }
    .mist2 {
      height: 20%;
      animation-duration: 12s;
      animation-direction: alternate-reverse;
      opacity: 0.5;
    }
    @keyframes driftMist {
      from { transform: translateX(-2%); }
      to   { transform: translateX(2%); }
    }

    /* Moon glow */
    .moon {
      position: absolute;
      top: 8%; left: 50%; transform: translateX(-50%);
      width: 90px; height: 90px;
      background: radial-gradient(circle, rgba(180,210,240,0.55) 0%, transparent 70%);
      border-radius: 50%;
      animation: moonPulse 4s ease-in-out infinite;
    }
    @keyframes moonPulse {
      0%,100% { opacity: 0.7; }
      50%      { opacity: 1; }
    }

    /* ── Glassmorphism Card ── */
    .card {
      position: relative; z-index: 10;
      width: 420px;
      background: rgba(180, 205, 230, 0.18);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 38px 36px 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.45), 0 1px 0 rgba(255,255,255,0.15) inset;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:none; } }

    /* Close button */
    .close-btn {
      position: absolute; top: 14px; right: 14px;
      width: 28px; height: 28px;
      background: #1a2e42;
      border: none; border-radius: 6px;
      color: #aac; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:hover { background: #243d56; }

    h2 {
      text-align: center;
      color: #e0eaf5;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 26px;
      letter-spacing: 0.5px;
    }

    /* ── Form Fields ── */
    .field {
      position: relative;
      margin-bottom: 18px;
    }
    .field input {
      width: 100%;
      padding: 13px 42px 13px 14px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 10px;
      color: #e0eaf5;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.25s, background 0.25s;
    }
    .field input::placeholder { color: rgba(180,210,240,0.65); }
    .field input:focus {
      border-color: rgba(120,180,240,0.7);
      background: rgba(255,255,255,0.18);
    }
    .field .icon {
      position: absolute; right: 13px; top: 50%;
      transform: translateY(-50%);
      color: rgba(160,200,240,0.7);
      font-size: 1rem; pointer-events: none;
    }
    .field .toggle-pw {
      pointer-events: all; cursor: pointer;
    }

    /* ── Row: Remember me + Forgot ── */
    .row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
      font-size: 0.83rem;
    }
    .row label { display: flex; align-items: center; gap: 6px; color: #b0c8e0; cursor: pointer; }
    .row input[type=checkbox] { accent-color: #5ba3d9; width: 14px; height: 14px; }
    .row a { color: #b0c8e0; text-decoration: none; }
    .row a:hover { color: #fff; text-decoration: underline; }

    /* ── Primary Button ── */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: #1a2e42;
      color: #e0eaf5;
      border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.5px;
    }
    .btn-primary:hover { background: #243d56; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0;
      color: rgba(180,210,240,0.5);
      font-size: 0.82rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.15);
    }

    /* ── Social Buttons ── */
    .social-btns { display: flex; flex-direction: column; gap: 11px; }

    .btn-social {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #dce8f5;
      font-size: 0.9rem; font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-social:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.35); }

    .btn-social svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* ── Footer link ── */
    .footer-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.84rem;
      color: rgba(180,210,240,0.75);
    }
    .footer-link a { color: #7ec8f0; font-weight: 600; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }

    /* ── Toast (password save prompt) ── */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: rgba(20,40,60,0.96);
      border: 1px solid rgba(120,180,240,0.35);
      backdrop-filter: blur(12px);
      color: #d0e8f8;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 0.88rem;
      display: flex; align-items: center; gap: 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      z-index: 999;
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.4s;
      opacity: 0;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast button {
      padding: 5px 14px;
      border-radius: 7px;
      border: none; cursor: pointer;
      font-size: 0.82rem; font-weight: 600;
    }
    .toast .save-btn   { background: #3a87c8; color: #fff; }
    .toast .nosave-btn { background: transparent; color: #8ab; border: 1px solid rgba(255,255,255,0.2); }

    /* ── Register panel (hidden by default) ── */
    #register-panel { display: none; }

    /* Error */
    .error-msg {
      color: #ff8080;
      font-size: 0.8rem;
      margin-top: -12px;
      margin-bottom: 12px;
      padding-left: 4px;
      display: none;
    }
  </style>
</head>
<body>

<!-- ── Login Card ── -->

<!-- ── Register Card ── -->
<div class="card" id="register-panel">
  <button class="close-btn" onclick="switchPanel('login')">✕</button>
  <h2>Register</h2>

  <form id="register-form" autocomplete="on" onsubmit="handleRegister(event)">
    <div class="field">
      <input type="text" name="name" id="reg-name"
             placeholder="Full Name" autocomplete="name" required/>
      <span class="icon">👤</span>
    </div>

    <div class="field">
      <input type="email" name="email" id="reg-email"
             placeholder="Email" autocomplete="email" required/>
      <span class="icon">✉</span>
    </div>

    <div class="field">
      <input type="password" name="password" id="reg-password"
             placeholder="Password" autocomplete="new-password" required minlength="6"/>
      <span class="icon toggle-pw" onclick="togglePw('reg-password', this)">🔒</span>

    <div class="field">

             placeholder="Confirm Password" autocomplete="new-password" required/>

    </div>

<!-- ── Password Save Toast ── -->
<div class="toast" id="save-toast">
  💾 Save this password for Story Co-Writer?
  <button class="save-btn"   onclick="savePassword()">Save</button>
  <button class="nosave-btn" onclick="dismissToast()">Not now</button>
</div>

<script>
  const API = 'http://localhost:5000';

  /* ── Panel switching ── */
  function switchPanel(panel) {
    document.getElementById('login-panel').style.display    = panel === 'login'    ? '' : 'none';
    document.getElementById('register-panel').style.display = panel === 'register' ? '' : 'none';
    clearMessages();
  }

  function clearMessages() {
    document.getElementById('login-error').style.display = 'none';
    document.getElementById('reg-error').style.display   = 'none';
  }

  /* ── Toggle password visibility ── */
  function togglePw(id, icon) {
    const input = document.getElementById(id);
    if (input.type === 'password') { input.type = 'text';     icon.textContent = '🔓'; }
    else                           { input.type = 'password'; icon.textContent = '🔒'; }
  }

  /* ── Show inline message ── */
  function showMsg(id, text, isError = true) {
    const el = document.getElementById(id);
    el.textContent      = text;
    el.style.display    = 'block';
    el.style.color      = isError ? '#ff8080' : '#7eda9c';
  }

  /* ── Check email with Python backend → hint user account exists ── */
  document.getElementById('login-email').addEventListener('blur', async function () {
    const email   = this.value.trim().toLowerCase();
    const pwField = document.getElementById('login-password');
    if (!email) return;
    try {
      const res  = await fetch(`${API}/api/check-email`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (data.exists) {
        /* Account found — nudge browser's native autofill */
        pwField.style.borderColor = 'rgba(100,200,120,0.6)';
        pwField.placeholder       = 'Account found — enter password';
      } else {
        pwField.style.borderColor = '';
        pwField.placeholder       = 'Password';
      }
    } catch (_) { /* server not reachable */ }
  });

  /* ── Login → Python backend ── */
  async function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('login-email').value.trim().toLowerCase();
    const pw    = document.getElementById('login-password').value;
    const err   = 'login-error';

    try {
      const res  = await fetch(`${API}/api/login`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password: pw })
      });
      const data = await res.json();
      if (data.success) {
        showMsg(err, `Welcome back, ${data.name}! Redirecting…`, false);
        setTimeout(() => { window.location.href = data.redirect; }, 800);
      } else {
        showMsg(err, data.message);
      }
    } catch (_) {
      showMsg(err, 'Cannot reach auth server. Is auth_server.py running?');
    }
  }

  /* ── Register → Python backend ── */
  async function handleRegister(e) {
    e.preventDefault();
    const name    = document.getElementById('reg-name').value.trim();
    const email   = document.getElementById('reg-email').value.trim().toLowerCase();
    const pw      = document.getElementById('reg-password').value;
    const confirm = document.getElementById('reg-confirm').value;
    const err     = 'reg-error';

    if (pw !== confirm) { showMsg(err, 'Passwords do not match.'); return; }

    try {
      const res  = await fetch(`${API}/api/register`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ name, email, password: pw })
      });
      const data = await res.json();
      if (data.success) {
        showMsg(err, data.message, false);
        showToast(email);
        setTimeout(() => switchPanel('login'), 1800);
      } else {
        showMsg(err, data.message);
      }
    } catch (_) {
      showMsg(err, 'Cannot reach auth server. Is auth_server.py running?');
    }
  }

  /* ── Toast: ask user to save password (browser native prompt) ── */
  function showToast(email) {
    window._savedEmail = email;
    document.getElementById('save-toast').classList.add('show');
  }
  function dismissToast() {
    document.getElementById('save-toast').classList.remove('show');
  }
  function savePassword() {
    /* Rely on the browser's native password-manager via autocomplete attributes.
       We pre-fill login email so the browser offers to save on next submit. */
    document.getElementById('login-email').value = window._savedEmail || '';
    dismissToast();
    switchPanel('login');
  }

  /* ── OAuth placeholder ── */
  function oauthLogin(provider) {
    alert(`${provider.charAt(0).toUpperCase() + provider.slice(1)} OAuth: wire up your OAuth endpoint in auth_server.py.`);
  }

  /* ── Forgot password ── */
  function showForgot() {
    const email = document.getElementById('login-email').value.trim();
    if (!email) { alert('Enter your email first, then click Forgot Password.'); return; }
    alert(`Password reset for ${email}: add a /api/forgot-password route in auth_server.py.`);
  }
</script>
</body>
